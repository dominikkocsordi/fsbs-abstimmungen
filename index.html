<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
  <title>Abstimmung · FSBS</title>
  <meta content="#000000" name="theme-color"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Lokale Cursive Font Einbindung */
    @font-face {
      font-family: 'Neulis Cursive';
      src: url('./fonts/neulis-cursive-regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      /* Premium Dark Mode & Gold Accent Palette */
      --bg-base: #000000; 
      --bg-surface: #0a0a0a; 
      --bg-highlight: #111111;
      
      --accent-gold: #FFD700; 
      --accent-gold-deep: #DAA520;
      --accent-gold-glow: rgba(255, 215, 0, 0.2);
      
      --text-main: rgba(255, 255, 255, 0.95);
      --text-muted: rgba(255, 255, 255, 0.60);
      
      --glass-bg: rgba(15, 15, 15, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-top: rgba(255, 255, 255, 0.15); /* Subtiles Glanzlicht */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body { 
      min-height: 100%; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      background: var(--bg-base); 
      color: var(--text-main); 
      overflow-x: hidden; 
      -webkit-font-smoothing: antialiased;
    }
    
    /* Typografie-Klassen */
    .font-cursive { 
      font-family: 'Neulis Cursive', cursive; 
      font-weight: normal; 
    }
    
    /* Background & Ambient Animations */
    .bg-gradient { 
      position: fixed; inset: 0; z-index: -2; 
      background: radial-gradient(circle at 50% 0%, var(--bg-highlight) 0%, var(--bg-surface) 40%, var(--bg-base) 100%);
      animation: ambientMesh 25s ease-in-out infinite alternate;
    }
    
    .radial-glow {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 1200px; height: 1200px; border-radius: 50%; z-index: -1;
      background: radial-gradient(circle, var(--glow-color, transparent) 0%, transparent 60%);
      opacity: 0.12; transition: background 1.5s ease;
      pointer-events: none;
    }

    @keyframes ambientMesh {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* Layout & Glass Card */
    .wrap { 
      width: 100%; max-width: 500px; margin: 0 auto; padding: 40px 20px 60px; 
      display: flex; flex-direction: column; align-items: center; 
      min-height: 100vh; justify-content: center; 
    }
    
    .glass { 
      background: var(--glass-bg); 
      border: 1px solid var(--glass-border); 
      border-top: 1px solid var(--glass-border-top);
      border-radius: 28px; 
      padding: 40px 32px; 
      width: 100%; 
      backdrop-filter: blur(24px); 
      -webkit-backdrop-filter: blur(24px); 
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.02); 
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
      position: relative;
    }

    /* Standardisierte UI Elemente (für saubereres JS) */
    .screen-title {
      font-size: 42px;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-align: center;
      line-height: 1.1;
      text-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
    }
    
    .screen-subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 32px;
      text-align: center;
      line-height: 1.5;
    }

    .success-icon {
      font-size: 56px;
      margin-bottom: 16px;
      text-align: center;
      filter: drop-shadow(0 0 24px var(--accent-gold-glow));
    }

    /* Code Inputs */
    .code-container { display: flex; gap: 12px; justify-content: center; margin: 0 0 32px; }
    .code-input { 
      width: 52px; height: 64px; font-size: 26px; font-weight: 800; text-align: center; 
      background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); 
      color: white; border-radius: 14px; outline: none; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); 
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
    .code-input:focus { 
      border-color: var(--accent-gold); background: rgba(255, 255, 255, 0.05); 
      transform: translateY(-4px); 
      box-shadow: 0 8px 20px var(--accent-gold-glow), inset 0 2px 4px rgba(0,0,0,0.5); 
    }

    /* Buttons */
    .btnPrimary { 
      width: 100%; padding: 18px; 
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-deep)); 
      color: #000; font-weight: 800; font-size: 16px; letter-spacing: 0.5px; text-transform: uppercase;
      border: none; border-radius: 16px; cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); 
      box-shadow: 0 8px 24px var(--accent-gold-glow); 
    }
    .btnPrimary:hover:not(:disabled) {
      box-shadow: 0 12px 32px rgba(255, 215, 0, 0.3); transform: translateY(-2px);
    }
    .btnPrimary:active:not(:disabled) { transform: scale(0.98); }
    .btnPrimary:disabled { 
      background: rgba(255, 255, 255, 0.05); color: var(--text-muted); 
      cursor: not-allowed; box-shadow: none; border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Voting Options */
    .optBtn { 
      width: 100%; padding: 18px 20px; background: rgba(0, 0, 0, 0.3); 
      border: 1px solid var(--glass-border); border-radius: 16px; color: var(--text-main); 
      font-size: 16px; font-weight: 500; text-align: left; cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; gap: 16px; margin-bottom: 12px; 
    }
    .optBtn:hover { background: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.2); }
    .optBtn.selected { 
      background: rgba(255, 215, 0, 0.05); border-color: var(--accent-gold); 
      box-shadow: 0 8px 24px var(--accent-gold-glow); 
    }
    
    .radio-circle {
      width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); 
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s ease;
    }
    .optBtn.selected .radio-circle {
      border-color: var(--accent-gold);
      box-shadow: 0 0 12px var(--accent-gold-glow);
    }
    .radio-inner {
      width: 12px; height: 12px; background: var(--accent-gold); border-radius: 50%; 
      transform: scale(0); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .optBtn.selected .radio-inner { transform: scale(1); }

    /* Delegation UI */
    .delegationSection { margin: 24px 0; padding: 20px; border-radius: 16px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.05); }
    .delegationTitle { font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .delegationCountRow { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .delegationCountRow label { font-size: 14px; color: var(--text-muted); }
    .countStepper { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .stepBtn { width: 32px; height: 32px; border-radius: 8px; background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; display: grid; place-items: center; transition: 0.2s; }
    .stepBtn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.1); }
    .stepBtn:disabled { opacity: 0.2; cursor: not-allowed; }
    .countDisplay { min-width: 24px; text-align: center; font-size: 16px; font-weight: 600; }
    
    .delegationNames { display: flex; flex-direction: column; gap: 12px; }
    .delegationNameInput { 
      background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); color: white; 
      padding: 14px 16px; border-radius: 12px; outline: none; font-size: 15px; width: 100%; 
      transition: 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    .delegationNameInput:focus { border-color: var(--accent-gold); background: rgba(255, 255, 255, 0.05); }

    /* Theatrical Animations */
    .anim-container { position: relative; width: 340px; height: 340px; display: flex; justify-content: center; align-items: center; margin: 0 auto 40px; display: none; }
    .loader-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 4px solid transparent; border-top-color: var(--anim-color-light); border-right-color: var(--anim-color-deep); opacity: 0; transform: scale(1) rotate(-90deg); filter: drop-shadow(0 0 10px var(--anim-color-light)); }
    .ambient-glow { position: absolute; width: 440px; height: 440px; border-radius: 50%; background: radial-gradient(circle, var(--anim-color-deep) 0%, transparent 60%); opacity: 0; transform: scale(0.5); pointer-events: none; mix-blend-mode: screen; }
    .white-flash { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: white; opacity: 0; transform: scale(0.2); filter: blur(4px); }
    .shockwave { position: absolute; width: 200px; height: 200px; border-radius: 50%; border: 1px solid var(--anim-color-light); opacity: 0; transform: scale(0.5); box-shadow: 0 0 30px var(--anim-color-light), inset 0 0 30px var(--anim-color-light); }
    .main-icon { position: absolute; width: 140px; height: 140px; opacity: 0; transform: scale(0); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)) drop-shadow(0 0 30px var(--anim-color-deep)); }
    .main-icon svg { width: 100%; height: 100%; }

    .anim-text { text-align: center; opacity: 0; transform: translateY(40px); }
    .anim-title { font-size: 48px; color: white; line-height: 1.1; margin-bottom: 8px; text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
    .anim-sub { font-size: 14px; font-weight: 600; letter-spacing: 4px; color: var(--text-muted); text-transform: uppercase; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pulseAmbient { 0% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.5; } 100% { transform: scale(1); opacity: 0.3; } }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="radial-glow" id="bgGlow"></div>
<div class="wrap" id="mainWrap">
  <div id="loadingState" style="text-align:center; color: var(--text-muted); font-weight: 500;">Lade System...</div>
</div>

<script>
  window.onerror = function(msg, url, lineNo, columnNo, error) {
    var wrap = document.getElementById("mainWrap");
    if(wrap) {
      wrap.innerHTML = `
        <div class="glass" style="text-align:center;">
          <div class="success-icon" style="color: #ff4444; filter: drop-shadow(0 0 20px rgba(255,68,68,0.4));">⚠️</div>
          <h2 class="font-cursive screen-title" style="color:#ff4444;">System-Fehler</h2>
          <p class="screen-subtitle">${msg}</p>
          <p style="color:rgba(255,255,255,0.3); font-size:12px;">Zeile: ${lineNo}</p>
        </div>`;
    }
    return false;
  };

  const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
  const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
  
  let sb;
  try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch(e) {
      throw new Error("Datenbank-Treiber fehlt. Evtl. blockiert ein Adblocker die Supabase-Verbindung.");
  }

  const wrap = document.getElementById("mainWrap");
  let currentSession = null;
  let voterCode = null;

  function getVoterToken(sessionId) {
    const key = "vt_" + sessionId;
    let vt = sessionStorage.getItem(key);
    if (!vt) { 
      vt = (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') 
            ? crypto.randomUUID() 
            : Math.random().toString(36).substring(2) + Date.now().toString(36);
      sessionStorage.setItem(key, vt); 
    }
    return vt;
  }

  function escapeHTML(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function showBlockedState() {
    wrap.innerHTML = `
      <div class="glass" style="text-align:center;">
        <div class="success-icon" style="filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));">🔒</div>
        <h2 class="font-cursive screen-title" style="color:white;">Bereits abgestimmt</h2>
        <p class="screen-subtitle">Du hast an dieser Abstimmung bereits teilgenommen.</p>
      </div>`;
  }

  function playTheatricalAnimation(type, callback) {
    const isTxtOpen = type === 'open';
    const titleText = isTxtOpen ? 'Wahl eröffnet' : 'Wahl geschlossen';
    const subText = isTxtOpen ? 'STIMMABGABE FREIGEGEBEN' : 'KEINE WEITEREN STIMMEN';
    
    const iconGreen = '<svg viewBox="0 0 24 24" fill="url(#gradGreen)"><defs><linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
    const iconRed = '<svg viewBox="0 0 24 24" fill="url(#gradRed)"><defs><linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="#ff4444"/></linearGradient></defs><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>';
    const iconSvg = isTxtOpen ? iconGreen : iconRed;

    wrap.innerHTML = `
      <div class="anim-container" id="animBox" style="display:flex;">
        <div class="ambient-glow" id="aGlow"></div>
        <div class="loader-ring" id="aLoader"></div>
        <div class="white-flash" id="aFlash"></div>
        <div class="shockwave" id="aShock"></div>
        <div class="main-icon" id="aIcon">${iconSvg}</div>
      </div>
      <div class="anim-text" id="aText">
        <div class="font-cursive anim-title">${titleText}</div>
        <div class="anim-sub">${subText}</div>
      </div>`;

    const root = document.documentElement;
    if(type === 'open') {
      root.style.setProperty('--anim-color-light', '#FFD700');
      root.style.setProperty('--anim-color-deep', '#DAA520');
      document.getElementById("bgGlow").style.setProperty('--glow-color', '#DAA520');
    } else {
      root.style.setProperty('--anim-color-light', '#ff4444');
      root.style.setProperty('--anim-color-deep', '#cc0000');
      document.getElementById("bgGlow").style.setProperty('--glow-color', '#cc0000');
    }

    const loader = document.getElementById("aLoader");
    const flash = document.getElementById("aFlash");
    const shock = document.getElementById("aShock");
    const icon = document.getElementById("aIcon");
    const glow = document.getElementById("aGlow");
    const text = document.getElementById("aText");

    loader.style.transition = "opacity 0.2s ease-out, transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1)";
    setTimeout(() => { loader.style.opacity = "1"; loader.style.transform = "scale(1) rotate(540deg)"; }, 50);

    setTimeout(() => {
      loader.style.transition = "transform 0.4s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.3s ease-in";
      loader.style.transform = "scale(0.01) rotate(600deg)";
      loader.style.opacity = "0";
    }, 2500);

    setTimeout(() => {
      flash.style.opacity = "1"; flash.style.transition = "transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease-out";
      setTimeout(() => { flash.style.transform = "scale(5)"; flash.style.opacity = "0"; }, 50);

      shock.style.opacity = "1"; shock.style.transition = "transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease-out";
      setTimeout(() => { shock.style.transform = "scale(4)"; shock.style.opacity = "0"; }, 50);

      icon.style.transition = "transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease-out";
      icon.style.opacity = "1"; icon.style.transform = "scale(1)";
      
      glow.style.transition = "opacity 0.8s ease"; glow.style.opacity = "0.5"; glow.style.transform = "scale(1)";
      glow.style.animation = "pulseAmbient 4s infinite ease-in-out 0.5s";

      setTimeout(() => {
        text.style.transition = "transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease";
        text.style.opacity = "1"; text.style.transform = "translateY(0)";
      }, 150);

      if(callback) setTimeout(callback, 2800);
    }, 2900);
  }

  function showWelcomeScreen() {
    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title">${escapeHTML(currentSession.title)}</h2>
        <p class="screen-subtitle">Die Abstimmung ist geöffnet.<br>Halte deinen Code bereit.</p>
        <button class="btnPrimary" id="startVoteBtn">Jetzt wählen</button>
      </div>`;

    document.getElementById('startVoteBtn').addEventListener('click', () => {
      if (currentSession.activeGroups && currentSession.activeGroups.length > 0) {
        showCodeEntry();
      } else {
        voterCode = null;
        playTheatricalAnimation('open', showVotingOptions);
      }
    });
  }

  function showCodeEntry() {
    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title">Wahl-Zugang</h2>
        <p class="screen-subtitle">Bitte gib deinen 5-stelligen Code ein.</p>
        <div class="code-container" id="codeInputs">
          <input type="text" maxlength="1" class="code-input" autofocus>
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
        </div>
        <div id="codeError" style="color:#ff4444; font-size:14px; font-weight:500; min-height:20px; margin-bottom:20px; text-align:center;"></div>
        <button class="btnPrimary" id="verifyBtn">Code verifizieren</button>
      </div>`;

    const inputs = document.querySelectorAll('.code-input');
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        input.value = input.value.toUpperCase();
        if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
      });
    });

    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const code = Array.from(inputs).map(i => i.value).join('');
      if(code.length !== 5) return;
      
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.textContent = "Prüfe...";
      
      const { data: codeData, error: codeErr } = await sb.from("voter_codes")
        .select("*").in("group_id", currentSession.activeGroups).eq("code", code).maybeSingle();
        
      if(!codeData || codeErr) {
        document.getElementById('codeError').textContent = "Dieser Code ist ungültig.";
        btn.disabled = false; btn.textContent = "Code verifizieren";
        return;
      }

      const { data: voteData } = await sb.from("votes")
        .select("id").eq("session_id", currentSession.id).eq("voter_code", code).maybeSingle();

      if(voteData) {
        document.getElementById('codeError').textContent = "Mit diesem Code wurde bereits abgestimmt.";
        btn.disabled = false; btn.textContent = "Code verifizieren";
        return;
      }

      voterCode = code; 
      playTheatricalAnimation('open', showVotingOptions);
    });
  }

  function showVotingOptions() {
    const opts = currentSession.options || [];
    const allowDelegation = !!currentSession.allow_delegation;
    let selected = null;
    let delegationCount = 0;

    let delegationHtml = "";
    if (allowDelegation) {
        delegationHtml = `
          <div class="delegationSection" id="delegationSection">
            <div class="delegationTitle">🔄 Stimmübertragungen</div>
            <div class="delegationCountRow">
              <label>Anzahl übertragener Stimmen:</label>
              <div class="countStepper">
                <button class="stepBtn" id="stepMinus" type="button" disabled>−</button>
                <span class="countDisplay" id="countDisplay">0</span>
                <button class="stepBtn" id="stepPlus" type="button">+</button>
              </div>
            </div>
            <div class="delegationNames" id="delegationNames"></div>
          </div>`;
    }

    let optsHtml = "";
    for (let i = 0; i < opts.length; i++) {
        optsHtml += `
          <button class="optBtn" data-i="${i}">
            <div class="radio-circle"><div class="radio-inner"></div></div>
            ${escapeHTML(opts[i])}
          </button>`;
    }

    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title" style="font-size:36px;">${escapeHTML(currentSession.title)}</h2>
        <p class="screen-subtitle" style="margin-bottom:24px;">Wähle eine Option und bestätige.</p>
        <div id="optList">${optsHtml}</div>
        ${delegationHtml}
        <button class="btnPrimary" id="submitVote" disabled style="margin-top:10px;">Stimme abgeben</button>
        <div id="vMsg" style="margin-top:16px; font-size:14px; font-weight:500; color:#ff4444; text-align:center;"></div>
      </div>`;

    const submitBtn = document.getElementById("submitVote");
    const vMsg = document.getElementById("vMsg");

    function updateSubmitLabel() {
      if (selected === null) return;
      const total = 1 + delegationCount;
      const optText = opts[selected];
      submitBtn.textContent = total > 1 ? `„${optText}“ wählen (${total} Stimmen)` : `„${optText}“ wählen`;
    }

    function updateDelegationNames() {
      if (!allowDelegation) return;
      const container = document.getElementById("delegationNames");
      const existing = container.querySelectorAll(".delegationNameInput");
      const currentCount = existing.length;
      if (delegationCount > currentCount) {
        for (let i = currentCount; i < delegationCount; i++) {
          const inp = document.createElement("input"); 
          inp.type = "text"; 
          inp.className = "delegationNameInput";
          inp.placeholder = `Name der ${i + 1}. übertragenden Person`; 
          inp.maxLength = 80; 
          container.appendChild(inp);
        }
      } else {
        for (let i = currentCount; i > delegationCount; i--) { 
          container.removeChild(container.lastChild); 
        }
      }
      document.getElementById("stepMinus").disabled = delegationCount <= 0;
      document.getElementById("countDisplay").textContent = delegationCount;
      updateSubmitLabel();
    }

    if (allowDelegation) {
      document.getElementById("stepPlus").addEventListener("click", () => { if (delegationCount >= 9) return; delegationCount++; updateDelegationNames(); });
      document.getElementById("stepMinus").addEventListener("click", () => { if (delegationCount <= 0) return; delegationCount--; updateDelegationNames(); });
    }

    document.querySelectorAll(".optBtn").forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll(".optBtn").forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); 
        selected = parseInt(btn.getAttribute('data-i')); 
        submitBtn.disabled = false; 
        updateSubmitLabel();
      });
    });

    submitBtn.addEventListener('click', async () => {
      if (selected === null) return;

      let delegationNames = null;
      if (allowDelegation && delegationCount > 0) {
        const inputs = document.querySelectorAll(".delegationNameInput");
        const names = Array.from(inputs).map(i => i.value.trim());
        if (names.some(n => !n)) { vMsg.textContent = "Bitte alle Namen eintragen."; return; }
        delegationNames = names;
      }

      submitBtn.disabled = true; submitBtn.textContent = "Wird gespeichert...";

      const vToken = getVoterToken(currentSession.id);
      const weight = 1 + delegationCount;

      const { error } = await sb.from("votes").insert({
        session_id: currentSession.id,
        option_index: selected,
        voter_code: voterCode,     
        voter_token: vToken, 
        weight: weight,
        delegation_names: delegationNames
      });

      if(error) {
        if(error.code === "23505") {
          sessionStorage.setItem("voted_" + currentSession.id, "1");
          showBlockedState();
        } else {
          vMsg.textContent = "Fehler bei der Abgabe: " + error.message;
          submitBtn.disabled = false; updateSubmitLabel();
        }
        return;
      }

      sessionStorage.setItem("voted_" + currentSession.id, "1");
      wrap.innerHTML = `
        <div class="glass" style="text-align:center;">
          <div class="success-icon">✅</div>
          <h2 class="font-cursive screen-title">Stimme erfasst</h2>
          <p class="screen-subtitle" style="margin-bottom:0;">Danke für deine Teilnahme.</p>
        </div>`;
    });
  }

  // --- HAUPT-LOGIK ---
  (async () => {
    try {
        const { data, error } = await sb.from("vote_sessions")
          .select("*")
          .eq("status", "open")
          .order("created_at", { ascending: false })
          .limit(1)
          .maybeSingle();

        if (error) throw new Error(error.message);
        
        if (!data) {
            wrap.innerHTML = `
              <div class="glass" style="text-align:center;">
                <div class="success-icon" style="filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));">⏳</div>
                <h2 class="font-cursive screen-title" style="color:white;">Keine aktive Wahl</h2>
                <p class="screen-subtitle">Derzeit läuft keine Abstimmung. Bitte warte, bis der Wahlgang eröffnet wird.</p>
              </div>`;
            return;
        }
        
        currentSession = data;

        if (sessionStorage.getItem("voted_" + currentSession.id)) { 
            showBlockedState();
            return; 
        }

        let activeGroups = [];
        if (data.group_ids && data.group_ids.length > 0) {
            activeGroups = data.group_ids;
        } else if (data.group_id) {
            activeGroups = [data.group_id];
        }
        currentSession.activeGroups = activeGroups;

        if(activeGroups.length === 0) {
            const vToken = getVoterToken(data.id);
            const { data: existingVote } = await sb.from("votes")
                .select("id").eq("session_id", data.id).eq("voter_token", vToken).maybeSingle();
            
            if (existingVote) {
                sessionStorage.setItem("voted_" + currentSession.id, "1");
                showBlockedState();
                return;
            }
        }

        showWelcomeScreen();

    } catch(err) {
        wrap.innerHTML = `
          <div class="glass" style="text-align:center;">
            <div class="success-icon" style="color:#ff4444; filter: drop-shadow(0 0 20px rgba(255,68,68,0.4));">⚠️</div>
            <h3 class="font-cursive screen-title" style="font-size:32px; color:#ff4444;">Fehler beim Laden</h3>
            <p class="screen-subtitle" style="color:#ff4444;">${err.message}</p>
          </div>`;
    }
  })();
</script>
</body>
</html>
