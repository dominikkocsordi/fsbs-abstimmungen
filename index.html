<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
  <title>Abstimmung · FSBS</title>
  <meta content="#050302" name="theme-color"/>
  
  <!-- Moderne serifenlose Schrift für das UI (Kontrast zur Cursive) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Lokale Cursive Font Einbindung */
    @font-face {
      font-family: 'Neulis Cursive';
      src: url('./fonts/neulis-cursive-regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      /* Elegante Sandbraun/Bronze Palette (Inspiriert vom ESC-Theme) */
      --bg-base: #050302; 
      --bg-surface: #140C07; 
      --bg-highlight: #1F140D;
      
      --accent-sand-light: #E6C8A6;
      --accent-sand: #D4A373; 
      --accent-sand-deep: #8B5A33;
      --accent-sand-glow: rgba(212, 163, 115, 0.25);
      
      --text-main: #FFFFFF;
      --text-muted: #BBAAA0;
      
      --glass-bg: rgba(15, 10, 6, 0.5);
      --glass-border: rgba(212, 163, 115, 0.15);
      --glass-border-top: rgba(255, 255, 255, 0.15);
      
      --error-red: #C84B31;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body { 
      min-height: 100%; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      background: var(--bg-base); 
      color: var(--text-main); 
      overflow-x: hidden; 
      -webkit-font-smoothing: antialiased;
    }
    
    /* Typografie-Klassen - Neulis immer Bold */
    .font-cursive { 
      font-family: 'Neulis Cursive', cursive; 
      font-weight: bold !important; 
      letter-spacing: 1px;
    }
    
    /* Background & Ambient Animations (Sandbraune Lichtstrahlen) */
    .bg-gradient { 
      position: fixed; inset: 0; z-index: -2; 
      background: radial-gradient(circle at 50% -20%, var(--bg-highlight) 0%, var(--bg-surface) 50%, var(--bg-base) 100%);
    }
    
    .radial-glow {
      position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
      width: 140vw; height: 140vw; border-radius: 50%; z-index: -1;
      background: radial-gradient(circle, var(--glow-color, rgba(212, 163, 115, 0.08)) 0%, transparent 60%);
      transition: background 1.5s ease;
      pointer-events: none;
      animation: pulseLight 10s infinite alternate ease-in-out;
    }

    @keyframes pulseLight {
      0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.95); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    /* Layout & Liquid Glass Card */
    .wrap { 
      width: 100%; max-width: 520px; margin: 0 auto; padding: 40px 20px 60px; 
      display: flex; flex-direction: column; align-items: center; 
      min-height: 100vh; justify-content: center; 
    }
    
    .glass { 
      background: var(--glass-bg); 
      border: 1px solid var(--glass-border); 
      border-top: 1px solid var(--glass-border-top);
      border-radius: 32px; 
      padding: 48px 36px; 
      width: 100%; 
      backdrop-filter: blur(30px); 
      -webkit-backdrop-filter: blur(30px); 
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 -10px 30px rgba(212, 163, 115, 0.05); 
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
      position: relative;
    }

    /* Standardisierte UI Elemente */
    .screen-title {
      font-size: 46px;
      color: var(--text-main);
      margin-bottom: 12px;
      text-align: center;
      line-height: 1.1;
      text-shadow: 0 0 30px var(--accent-sand-glow), 0 2px 4px rgba(0,0,0,0.5);
    }
    
    .screen-subtitle {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 300;
      margin-bottom: 36px;
      text-align: center;
      line-height: 1.6;
    }

    .success-icon {
      font-size: 56px;
      margin-bottom: 20px;
      text-align: center;
      filter: drop-shadow(0 0 24px var(--accent-sand-glow));
    }

    /* Code Inputs */
    .code-container { display: flex; gap: 14px; justify-content: center; margin: 0 0 36px; }
    .code-input { 
      width: 54px; height: 68px; font-size: 28px; font-weight: 800; text-align: center; 
      background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212, 163, 115, 0.2); 
      color: var(--accent-sand-light); border-radius: 16px; outline: none; 
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    .code-input:focus { 
      border-color: var(--accent-sand); 
      background: rgba(212, 163, 115, 0.08); 
      transform: translateY(-4px); 
      box-shadow: 0 8px 24px var(--accent-sand-glow), inset 0 2px 4px rgba(0,0,0,0.5); 
    }

    /* Buttons */
    .btnPrimary { 
      width: 100%; padding: 20px; 
      background: linear-gradient(135deg, var(--accent-sand-light), var(--accent-sand-deep)); 
      color: #1A1008; font-weight: 800; font-size: 16px; letter-spacing: 0.5px; text-transform: uppercase;
      border: none; border-radius: 18px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
      box-shadow: 0 10px 30px var(--accent-sand-glow); 
    }
    .btnPrimary:hover:not(:disabled) {
      box-shadow: 0 15px 40px rgba(212, 163, 115, 0.4); transform: translateY(-2px);
      background: linear-gradient(135deg, #F5DCC0, var(--accent-sand));
    }
    .btnPrimary:active:not(:disabled) { transform: scale(0.98); }
    .btnPrimary:disabled { 
      background: rgba(255, 255, 255, 0.03); color: rgba(255, 255, 255, 0.2); 
      cursor: not-allowed; box-shadow: none; border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Voting Options */
    .optBtn { 
      width: 100%; padding: 20px 24px; background: rgba(0, 0, 0, 0.4); 
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; color: var(--text-main); 
      font-size: 16px; font-weight: 400; text-align: left; cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; gap: 18px; margin-bottom: 14px; 
    }
    .optBtn:hover { background: rgba(212, 163, 115, 0.05); border-color: rgba(212, 163, 115, 0.3); }
    .optBtn.selected { 
      background: rgba(212, 163, 115, 0.08); border-color: var(--accent-sand); 
      box-shadow: 0 10px 30px var(--accent-sand-glow); 
    }
    
    .radio-circle {
      width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); 
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s ease;
    }
    .optBtn.selected .radio-circle {
      border-color: var(--accent-sand);
      box-shadow: 0 0 16px var(--accent-sand-glow);
    }
    .radio-inner {
      width: 12px; height: 12px; background: var(--accent-sand-light); border-radius: 50%; 
      transform: scale(0); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 10px var(--accent-sand-light);
    }
    .optBtn.selected .radio-inner { transform: scale(1); }

    /* Delegation UI */
    .delegationSection { margin: 28px 0; padding: 24px; border-radius: 20px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.05); }
    .delegationTitle { font-size: 13px; font-weight: 600; color: var(--accent-sand); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1.5px; }
    .delegationCountRow { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .delegationCountRow label { font-size: 15px; color: var(--text-muted); }
    .countStepper { display: flex; align-items: center; gap: 14px; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 14px; border: 1px solid rgba(212, 163, 115, 0.15); }
    .stepBtn { width: 36px; height: 36px; border-radius: 10px; background: transparent; border: none; color: var(--accent-sand-light); font-size: 22px; cursor: pointer; display: grid; place-items: center; transition: 0.2s; }
    .stepBtn:hover:not(:disabled) { background: rgba(212, 163, 115, 0.15); }
    .stepBtn:disabled { opacity: 0.2; cursor: not-allowed; color: white; }
    .countDisplay { min-width: 28px; text-align: center; font-size: 18px; font-weight: 600; color: var(--text-main); }
    
    .delegationNames { display: flex; flex-direction: column; gap: 14px; }
    .delegationNameInput { 
      background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); color: white; 
      padding: 16px 18px; border-radius: 14px; outline: none; font-size: 15px; width: 100%; 
      transition: 0.3s; box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
    }
    .delegationNameInput:focus { border-color: var(--accent-sand); background: rgba(212, 163, 115, 0.05); }

    /* Theatrical Animations (Angepasst auf Sandbraun/Gold) */
    .anim-container { position: relative; width: 340px; height: 340px; display: flex; justify-content: center; align-items: center; margin: 0 auto 40px; display: none; }
    .loader-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--anim-color-light); border-right-color: var(--anim-color-deep); opacity: 0; transform: scale(1) rotate(-90deg); filter: drop-shadow(0 0 15px var(--anim-color-light)); }
    .ambient-glow { position: absolute; width: 440px; height: 440px; border-radius: 50%; background: radial-gradient(circle, var(--anim-color-deep) 0%, transparent 60%); opacity: 0; transform: scale(0.5); pointer-events: none; mix-blend-mode: screen; }
    .white-flash { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: #FFF; opacity: 0; transform: scale(0.2); filter: blur(5px); }
    .shockwave { position: absolute; width: 200px; height: 200px; border-radius: 50%; border: 1.5px solid var(--anim-color-light); opacity: 0; transform: scale(0.5); box-shadow: 0 0 40px var(--anim-color-light), inset 0 0 40px var(--anim-color-light); }
    .main-icon { position: absolute; width: 150px; height: 150px; opacity: 0; transform: scale(0); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)) drop-shadow(0 0 40px var(--anim-color-deep)); }
    .main-icon svg { width: 100%; height: 100%; }

    .anim-text { text-align: center; opacity: 0; transform: translateY(40px); }
    .anim-title { font-size: 52px; color: var(--text-main); line-height: 1.1; margin-bottom: 8px; text-shadow: 0 0 30px var(--accent-sand-glow), 0 4px 12px rgba(0,0,0,0.8); }
    .anim-sub { font-size: 15px; font-weight: 600; letter-spacing: 5px; color: var(--text-muted); text-transform: uppercase; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(40px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pulseAmbientAnim { 0% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.15); opacity: 0.7; } 100% { transform: scale(1); opacity: 0.4; } }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="radial-glow" id="bgGlow"></div>
<div class="wrap" id="mainWrap">
  <div id="loadingState" style="text-align:center; color: var(--text-muted); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 14px;">Lade System...</div>
</div>

<script>
  window.onerror = function(msg, url, lineNo, columnNo, error) {
    var wrap = document.getElementById("mainWrap");
    if(wrap) {
      wrap.innerHTML = `
        <div class="glass" style="text-align:center;">
          <div class="success-icon" style="color: var(--error-red); filter: drop-shadow(0 0 20px rgba(200,75,49,0.4));">⚠️</div>
          <h2 class="font-cursive screen-title" style="color:var(--text-main); text-shadow: 0 0 20px rgba(200,75,49,0.5);">System-Fehler</h2>
          <p class="screen-subtitle">${msg}</p>
          <p style="color:rgba(255,255,255,0.2); font-size:12px;">Zeile: ${lineNo}</p>
        </div>`;
    }
    return false;
  };

  const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
  const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
  
  let sb;
  try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch(e) {
      throw new Error("Datenbank-Treiber fehlt. Evtl. blockiert ein Adblocker die Supabase-Verbindung.");
  }

  const wrap = document.getElementById("mainWrap");
  let currentSession = null;
  let voterCode = null;

  function getVoterToken(sessionId) {
    const key = "vt_" + sessionId;
    let vt = sessionStorage.getItem(key);
    if (!vt) { 
      vt = (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') 
            ? crypto.randomUUID() 
            : Math.random().toString(36).substring(2) + Date.now().toString(36);
      sessionStorage.setItem(key, vt); 
    }
    return vt;
  }

  function escapeHTML(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function showBlockedState() {
    wrap.innerHTML = `
      <div class="glass" style="text-align:center;">
        <div class="success-icon" style="filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));">🔒</div>
        <h2 class="font-cursive screen-title">Bereits abgestimmt</h2>
        <p class="screen-subtitle">Du hast an dieser Abstimmung bereits teilgenommen.</p>
      </div>`;
  }

  function playTheatricalAnimation(type, callback) {
    const isTxtOpen = type === 'open';
    const titleText = isTxtOpen ? 'Wahl eröffnet' : 'Wahl geschlossen';
    const subText = isTxtOpen ? 'STIMMABGABE FREIGEGEBEN' : 'KEINE WEITEREN STIMMEN';
    
    // SVG Icons mit Sandbraun-Farbverlauf anstelle von einfachem Grün
    const iconSand = `<svg viewBox="0 0 24 24" fill="url(#gradSand)"><defs><linearGradient id="gradSand" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF"/><stop offset="100%" stop-color="var(--accent-sand)"/></linearGradient></defs><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
    const iconRed = `<svg viewBox="0 0 24 24" fill="url(#gradRed)"><defs><linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF"/><stop offset="100%" stop-color="var(--error-red)"/></linearGradient></defs><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>`;
    const iconSvg = isTxtOpen ? iconSand : iconRed;

    wrap.innerHTML = `
      <div class="anim-container" id="animBox" style="display:flex;">
        <div class="ambient-glow" id="aGlow"></div>
        <div class="loader-ring" id="aLoader"></div>
        <div class="white-flash" id="aFlash"></div>
        <div class="shockwave" id="aShock"></div>
        <div class="main-icon" id="aIcon">${iconSvg}</div>
      </div>
      <div class="anim-text" id="aText">
        <div class="font-cursive anim-title">${titleText}</div>
        <div class="anim-sub">${subText}</div>
      </div>`;

    const root = document.documentElement;
    if(type === 'open') {
      root.style.setProperty('--anim-color-light', 'var(--accent-sand-light)');
      root.style.setProperty('--anim-color-deep', 'var(--accent-sand-deep)');
      document.getElementById("bgGlow").style.setProperty('--glow-color', 'rgba(212, 163, 115, 0.15)');
    } else {
      root.style.setProperty('--anim-color-light', '#FF8A8A');
      root.style.setProperty('--anim-color-deep', 'var(--error-red)');
      document.getElementById("bgGlow").style.setProperty('--glow-color', 'rgba(200, 75, 49, 0.15)');
    }

    const loader = document.getElementById("aLoader");
    const flash = document.getElementById("aFlash");
    const shock = document.getElementById("aShock");
    const icon = document.getElementById("aIcon");
    const glow = document.getElementById("aGlow");
    const text = document.getElementById("aText");

    loader.style.transition = "opacity 0.2s ease-out, transform 2.8s cubic-bezier(0.2, 0.8, 0.2, 1)";
    setTimeout(() => { loader.style.opacity = "1"; loader.style.transform = "scale(1) rotate(540deg)"; }, 50);

    setTimeout(() => {
      loader.style.transition = "transform 0.5s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.4s ease-in";
      loader.style.transform = "scale(0.01) rotate(650deg)";
      loader.style.opacity = "0";
    }, 2600);

    setTimeout(() => {
      flash.style.opacity = "1"; flash.style.transition = "transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.7s ease-out";
      setTimeout(() => { flash.style.transform = "scale(6)"; flash.style.opacity = "0"; }, 50);

      shock.style.opacity = "1"; shock.style.transition = "transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease-out";
      setTimeout(() => { shock.style.transform = "scale(5)"; shock.style.opacity = "0"; }, 50);

      icon.style.transition = "transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease-out";
      icon.style.opacity = "1"; icon.style.transform = "scale(1)";
      
      glow.style.transition = "opacity 1s ease"; glow.style.opacity = "0.7"; glow.style.transform = "scale(1)";
      glow.style.animation = "pulseAmbientAnim 4s infinite ease-in-out 0.5s";

      setTimeout(() => {
        text.style.transition = "transform 0.9s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.9s ease";
        text.style.opacity = "1"; text.style.transform = "translateY(0)";
      }, 150);

      if(callback) setTimeout(callback, 3000);
    }, 3000);
  }

  function showWelcomeScreen() {
    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title">${escapeHTML(currentSession.title)}</h2>
        <p class="screen-subtitle">Die Abstimmung ist geöffnet.<br>Halte deinen Code bereit.</p>
        <button class="btnPrimary" id="startVoteBtn">Jetzt wählen</button>
      </div>`;

    document.getElementById('startVoteBtn').addEventListener('click', () => {
      if (currentSession.activeGroups && currentSession.activeGroups.length > 0) {
        showCodeEntry();
      } else {
        voterCode = null;
        playTheatricalAnimation('open', showVotingOptions);
      }
    });
  }

  function showCodeEntry() {
    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title" style="font-size:38px;">Wahl-Zugang</h2>
        <p class="screen-subtitle">Bitte gib deinen 5-stelligen Code ein.</p>
        <div class="code-container" id="codeInputs">
          <input type="text" maxlength="1" class="code-input" autofocus>
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
        </div>
        <div id="codeError" style="color:var(--error-red); font-size:14px; font-weight:500; min-height:20px; margin-bottom:24px; text-align:center; text-shadow: 0 0 10px rgba(200,75,49,0.3);"></div>
        <button class="btnPrimary" id="verifyBtn">Code verifizieren</button>
      </div>`;

    const inputs = document.querySelectorAll('.code-input');
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        input.value = input.value.toUpperCase();
        if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
      });
    });

    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const code = Array.from(inputs).map(i => i.value).join('');
      if(code.length !== 5) return;
      
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.textContent = "Prüfe...";
      
      const { data: codeData, error: codeErr } = await sb.from("voter_codes")
        .select("*").in("group_id", currentSession.activeGroups).eq("code", code).maybeSingle();
        
      if(!codeData || codeErr) {
        document.getElementById('codeError').textContent = "Dieser Code ist ungültig.";
        btn.disabled = false; btn.textContent = "Code verifizieren";
        return;
      }

      const { data: voteData } = await sb.from("votes")
        .select("id").eq("session_id", currentSession.id).eq("voter_code", code).maybeSingle();

      if(voteData) {
        document.getElementById('codeError').textContent = "Mit diesem Code wurde bereits abgestimmt.";
        btn.disabled = false; btn.textContent = "Code verifizieren";
        return;
      }

      voterCode = code; 
      playTheatricalAnimation('open', showVotingOptions);
    });
  }

  function showVotingOptions() {
    const opts = currentSession.options || [];
    const allowDelegation = !!currentSession.allow_delegation;
    let selected = null;
    let delegationCount = 0;

    let delegationHtml = "";
    if (allowDelegation) {
        delegationHtml = `
          <div class="delegationSection" id="delegationSection">
            <div class="delegationTitle">🔄 Stimmübertragungen</div>
            <div class="delegationCountRow">
              <label>Anzahl übertragener Stimmen:</label>
              <div class="countStepper">
                <button class="stepBtn" id="stepMinus" type="button" disabled>−</button>
                <span class="countDisplay" id="countDisplay">0</span>
                <button class="stepBtn" id="stepPlus" type="button">+</button>
              </div>
            </div>
            <div class="delegationNames" id="delegationNames"></div>
          </div>`;
    }

    let optsHtml = "";
    for (let i = 0; i < opts.length; i++) {
        optsHtml += `
          <button class="optBtn" data-i="${i}">
            <div class="radio-circle"><div class="radio-inner"></div></div>
            ${escapeHTML(opts[i])}
          </button>`;
    }

    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title" style="font-size:40px;">${escapeHTML(currentSession.title)}</h2>
        <p class="screen-subtitle" style="margin-bottom:28px;">Wähle eine Option und bestätige.</p>
        <div id="optList">${optsHtml}</div>
        ${delegationHtml}
        <button class="btnPrimary" id="submitVote" disabled style="margin-top:16px;">Stimme abgeben</button>
        <div id="vMsg" style="margin-top:20px; font-size:14px; font-weight:500; color:var(--error-red); text-align:center;"></div>
      </div>`;

    const submitBtn = document.getElementById("submitVote");
    const vMsg = document.getElementById("vMsg");

    function updateSubmitLabel() {
      if (selected === null) return;
      const total = 1 + delegationCount;
      const optText = opts[selected];
      submitBtn.textContent = total > 1 ? `„${optText}“ wählen (${total} Stimmen)` : `„${optText}“ wählen`;
    }

    function updateDelegationNames() {
      if (!allowDelegation) return;
      const container = document.getElementById("delegationNames");
      const existing = container.querySelectorAll(".delegationNameInput");
      const currentCount = existing.length;
      if (delegationCount > currentCount) {
        for (let i = currentCount; i < delegationCount; i++) {
          const inp = document.createElement("input"); 
          inp.type = "text"; 
          inp.className = "delegationNameInput";
          inp.placeholder = `Name der ${i + 1}. übertragenden Person`; 
          inp.maxLength = 80; 
          container.appendChild(inp);
        }
      } else {
        for (let i = currentCount; i > delegationCount; i--) { 
          container.removeChild(container.lastChild); 
        }
      }
      document.getElementById("stepMinus").disabled = delegationCount <= 0;
      document.getElementById("countDisplay").textContent = delegationCount;
      updateSubmitLabel();
    }

    if (allowDelegation) {
      document.getElementById("stepPlus").addEventListener("click", () => { if (delegationCount >= 9) return; delegationCount++; updateDelegationNames(); });
      document.getElementById("stepMinus").addEventListener("click", () => { if (delegationCount <= 0) return; delegationCount--; updateDelegationNames(); });
    }

    document.querySelectorAll(".optBtn").forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll(".optBtn").forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); 
        selected = parseInt(btn.getAttribute('data-i')); 
        submitBtn.disabled = false; 
        updateSubmitLabel();
      });
    });

    submitBtn.addEventListener('click', async () => {
      if (selected === null) return;

      let delegationNames = null;
      if (allowDelegation && delegationCount > 0) {
        const inputs = document.querySelectorAll(".delegationNameInput");
        const names = Array.from(inputs).map(i => i.value.trim());
        if (names.some(n => !n)) { vMsg.textContent = "Bitte alle Namen eintragen."; return; }
        delegationNames = names;
      }

      submitBtn.disabled = true; submitBtn.textContent = "Wird gespeichert...";

      const vToken = getVoterToken(currentSession.id);
      const weight = 1 + delegationCount;

      const { error } = await sb.from("votes").insert({
        session_id: currentSession.id,
        option_index: selected,
        voter_code: voterCode,     
        voter_token: vToken, 
        weight: weight,
        delegation_names: delegationNames
      });

      if(error) {
        if(error.code === "23505") {
          sessionStorage.setItem("voted_" + currentSession.id, "1");
          showBlockedState();
        } else {
          vMsg.textContent = "Fehler bei der Abgabe: " + error.message;
          submitBtn.disabled = false; updateSubmitLabel();
        }
        return;
      }

      sessionStorage.setItem("voted_" + currentSession.id, "1");
      wrap.innerHTML = `
        <div class="glass" style="text-align:center;">
          <div class="success-icon" style="filter: drop-shadow(0 0 30px var(--accent-sand-glow));">✨</div>
          <h2 class="font-cursive screen-title">Stimme erfasst</h2>
          <p class="screen-subtitle" style="margin-bottom:0;">Danke für deine Teilnahme.</p>
        </div>`;
    });
  }

  // --- HAUPT-LOGIK ---
  (async () => {
    try {
        const { data, error } = await sb.from("vote_sessions")
          .select("*")
          .eq("status", "open")
          .order("created_at", { ascending: false })
          .limit(1)
          .maybeSingle();

        if (error) throw new Error(error.message);
        
        if (!data) {
            wrap.innerHTML = `
              <div class="glass" style="text-align:center;">
                <div class="success-icon" style="filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));">⏳</div>
                <h2 class="font-cursive screen-title">Keine aktive Wahl</h2>
                <p class="screen-subtitle">Derzeit läuft keine Abstimmung.<br>Bitte warte, bis der Wahlgang eröffnet wird.</p>
              </div>`;
            return;
        }
        
        currentSession = data;

        if (sessionStorage.getItem("voted_" + currentSession.id)) { 
            showBlockedState();
            return; 
        }

        let activeGroups = [];
        if (data.group_ids && data.group_ids.length > 0) {
            activeGroups = data.group_ids;
        } else if (data.group_id) {
            activeGroups = [data.group_id];
        }
        currentSession.activeGroups = activeGroups;

        if(activeGroups.length === 0) {
            const vToken = getVoterToken(data.id);
            const { data: existingVote } = await sb.from("votes")
                .select("id").eq("session_id", data.id).eq("voter_token", vToken).maybeSingle();
            
            if (existingVote) {
                sessionStorage.setItem("voted_" + currentSession.id, "1");
                showBlockedState();
                return;
            }
        }

        showWelcomeScreen();

    } catch(err) {
        wrap.innerHTML = `
          <div class="glass" style="text-align:center;">
            <div class="success-icon" style="color:var(--error-red); filter: drop-shadow(0 0 20px rgba(200,75,49,0.4));">⚠️</div>
            <h3 class="font-cursive screen-title" style="font-size:36px; color:var(--text-main); text-shadow: 0 0 20px rgba(200,75,49,0.5);">Fehler beim Laden</h3>
            <p class="screen-subtitle" style="color:var(--error-red);">${err.message}</p>
          </div>`;
    }
  })();
</script>
</body>
</html>
