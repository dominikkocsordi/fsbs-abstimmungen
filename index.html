<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
  <title>Abstimmung · FSBS</title>
  <meta content="#000000" name="theme-color"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      /* Farbschema aus zweiter Quelle (Schwarz/Gold) */
      --bg1: #000000; --bg2: #0a0a0a; --bg3: #111111;
      --red-light: #ffffff; --red-deep: #cccccc;
      --green-light: #FFD700; --green-deep: #DAA520;
      --accent1: #FFD700; --accent2: #DAA520;
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.65);
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.12);
      --glass-glow: inset 0 0 20px rgba(255, 215, 0, 0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
        min-height: 100%; 
        font-family: system-ui, -apple-system, sans-serif; 
        background: var(--bg1); 
        color: var(--text); 
        overflow-x: hidden; 
    }
    
    .bg-gradient { 
      position: fixed; inset: 0; z-index: -2; 
      background: radial-gradient(circle at 50% 0%, var(--bg3) 0%, var(--bg2) 40%, var(--bg1) 100%);
      animation: ambientMesh 20s ease-in-out infinite alternate;
    }
    
    .radial-glow {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 1000px; height: 1000px; border-radius: 50%; z-index: -1;
      background: radial-gradient(circle, var(--glow-color, transparent) 0%, transparent 60%);
      opacity: 0.15; transition: background 1.5s ease;
      pointer-events: none;
    }

    @keyframes ambientMesh {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    .wrap { 
        width: 100%; max-width: 520px; margin: 0 auto; padding: 40px 16px 60px; 
        display: flex; flex-direction: column; align-items: center; 
        min-height: 100vh; justify-content: center; 
    }
    
    .glass { 
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 22px; 
      padding: 30px 24px; 
      width: 100%; 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px); 
      box-shadow: 0 20px 55px rgba(0,0,0,0.50), var(--glass-glow); 
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
      position: relative;
      overflow: hidden;
    }
    
    .glass::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
    }

    .code-container { display: flex; gap: 10px; justify-content: center; margin: 20px 0 24px; }
    .code-input { 
      width: 50px; height: 60px; font-size: 24px; font-weight: 800; text-align: center; 
      background: rgba(255, 255, 255, 0.08); border: 2px solid rgba(255, 255, 255, 0.2); 
      color: white; border-radius: 12px; outline: none; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    .code-input:focus { 
      border-color: var(--accent1); background: rgba(255, 255, 255, 0.12); 
      transform: translateY(-4px); box-shadow: 0 8px 16px rgba(255, 215, 0, 0.15), inset 0 2px 4px rgba(0,0,0,0.3); 
    }

    .btnPrimary { 
      width: 100%; padding: 16px; 
      background: linear-gradient(135deg, var(--accent1), var(--accent2)); 
      color: #000; font-weight: 800; font-size: 16px; letter-spacing: 0.5px;
      border: none; border-radius: 16px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); 
      margin-top: 20px; box-shadow: 0 8px 24px rgba(255, 215, 0, 0.2); 
    }
    .btnPrimary:hover {
      box-shadow: 0 12px 32px rgba(255, 215, 0, 0.3); transform: translateY(-2px);
    }
    .btnPrimary:active { transform: scale(0.97); }
    .btnPrimary:disabled { background: rgba(255, 255, 255, 0.1); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

    .optBtn { 
      width: 100%; padding: 16px 20px; background: rgba(255, 255, 255, 0.05); 
      border: 1.5px solid var(--border); border-radius: 16px; color: white; 
      font-size: 16px; font-weight: 600; text-align: left; cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; gap: 16px; margin-bottom: 10px; 
    }
    .optBtn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
    .optBtn.selected { 
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(218, 165, 32, 0.15)); border-color: var(--accent1); 
      box-shadow: 0 8px 24px rgba(255, 215, 0, 0.2), inset 0 0 20px rgba(255, 215, 0, 0.05); 
    }

    .delegationSection { margin-top: 20px; padding: 18px; border-radius: 16px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); }
    .delegationTitle { font-size: 15px; font-weight: 700; color: white; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .delegationCountRow { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .delegationCountRow label { font-size: 14px; color: var(--muted); font-weight: 500; }
    .countStepper { display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.05); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
    .stepBtn { width: 34px; height: 34px; border-radius: 10px; background: transparent; border: none; color: white; font-size: 20px; font-weight: 500; cursor: pointer; display: grid; place-items: center; transition: 0.2s; }
    .stepBtn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.1); }
    .stepBtn:disabled { opacity: 0.2; cursor: not-allowed; }
    .countDisplay { min-width: 24px; text-align: center; font-size: 18px; font-weight: 800; }
    
    .delegationNames { display: flex; flex-direction: column; gap: 10px; }
    .delegationNameInput { 
      background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border); color: white; 
      padding: 12px 16px; border-radius: 12px; outline: none; font-size: 14px; width: 100%; 
      transition: 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }
    .delegationNameInput:focus { border-color: var(--accent1); background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0 1px var(--accent1), inset 0 2px 4px rgba(0,0,0,0.2); }
    
    .anim-container { position: relative; width: 340px; height: 340px; display: flex; justify-content: center; align-items: center; margin: 0 auto 40px; display: none; }
    .loader-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 6px solid transparent; border-top-color: var(--anim-color-light); border-right-color: var(--anim-color-deep); opacity: 0; transform: scale(1) rotate(-90deg); filter: drop-shadow(0 0 10px var(--anim-color-light)); }
    
    .ambient-glow { position: absolute; width: 440px; height: 440px; border-radius: 50%; background: radial-gradient(circle, var(--anim-color-deep) 0%, transparent 60%); opacity: 0; transform: scale(0.5); pointer-events: none; mix-blend-mode: screen; }
    .white-flash { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: white; opacity: 0; transform: scale(0.2); filter: blur(4px); }
    .shockwave { position: absolute; width: 200px; height: 200px; border-radius: 50%; border: 2px solid var(--anim-color-light); opacity: 0; transform: scale(0.5); box-shadow: 0 0 20px var(--anim-color-light), inset 0 0 20px var(--anim-color-light); }
    .main-icon { position: absolute; width: 140px; height: 140px; opacity: 0; transform: scale(0); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)) drop-shadow(0 0 30px var(--anim-color-deep)); }
    .main-icon svg { width: 100%; height: 100%; }

    .anim-text { text-align: center; opacity: 0; transform: translateY(40px); }
    .anim-title { font-size: 40px; font-weight: 900; color: white; line-height: 1.1; margin-bottom: 8px; text-shadow: 0 4px 12px rgba(0,0,0,0.5); letter-spacing: -0.5px; }
    .anim-sub { font-size: 15px; font-weight: 700; letter-spacing: 5px; color: var(--muted); text-transform: uppercase; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes pulseAmbient { 0% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.15); opacity: 0.6; } 100% { transform: scale(1); opacity: 0.4; } }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="radial-glow" id="bgGlow"></div>
<div class="wrap" id="mainWrap">
<div id="loadingState" style="text-align:center; color: var(--muted);">Lade System...</div>
</div>
<script>
  window.onerror = function(msg, url, lineNo, columnNo, error) {
    var wrap = document.getElementById("mainWrap");
    if(wrap) {
      wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
        '<div style="font-size:48px; margin-bottom:16px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));">⚠️</div>' +
        '<h2 style="font-size:24px; font-weight:800; color:var(--red-light); margin-bottom:12px;">System-Fehler</h2>' +
        '<p style="color:var(--muted); font-size:14px;">' + msg + '</p>' +
        '<p style="color:rgba(255,255,255,0.3); font-size:12px; margin-top:12px;">Zeile: ' + lineNo + '</p></div>';
    }
    return false;
  };

  const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
  const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
  
  let sb;
  try {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch(e) {
      throw new Error("Datenbank-Treiber fehlt. Evtl. blockiert ein Adblocker die Supabase-Verbindung.");
  }

  const wrap = document.getElementById("mainWrap");
  let currentSession = null;
  let voterCode = null;

  function getVoterToken(sessionId) {
    const key = "vt_" + sessionId;
    let vt = sessionStorage.getItem(key);
    if (!vt) { 
      vt = (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') 
            ? crypto.randomUUID() 
            : Math.random().toString(36).substring(2) + Date.now().toString(36);
      sessionStorage.setItem(key, vt); 
    }
    return vt;
  }

  function escapeHTML(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function showBlockedState() {
    wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
      '<div style="font-size:48px; margin-bottom:16px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));">🔒</div>' +
      '<h2 style="font-size:26px; font-weight:800; color:white;">Bereits abgestimmt</h2>' +
      '<p style="color:var(--muted); font-size:15px; margin-top:12px;">Du hast an dieser Abstimmung bereits teilgenommen.</p>' +
      '</div>';
  }

  function playTheatricalAnimation(type, callback) {
    const isTxtOpen = type === 'open';
    const titleText = isTxtOpen ? 'Wahl eröffnet' : 'Wahl geschlossen';
    const subText = isTxtOpen ? 'STIMMABGABE FREIGEGEBEN' : 'KEINE WEITEREN STIMMEN';
    
    const iconGreen = '<svg viewBox="0 0 24 24" fill="url(#gradGreen)"><defs><linearGradient id="gradGreen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="var(--green-light)"/></linearGradient></defs><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
    const iconRed = '<svg viewBox="0 0 24 24" fill="url(#gradRed)"><defs><linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="var(--red-light)"/></linearGradient></defs><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>';
    const iconSvg = isTxtOpen ? iconGreen : iconRed;

    wrap.innerHTML = '<div class="anim-container" id="animBox" style="display:flex;">' +
      '<div class="ambient-glow" id="aGlow"></div>' +
      '<div class="loader-ring" id="aLoader"></div>' +
      '<div class="white-flash" id="aFlash"></div>' +
      '<div class="shockwave" id="aShock"></div>' +
      '<div class="main-icon" id="aIcon">' + iconSvg + '</div>' +
      '</div>' +
      '<div class="anim-text" id="aText">' +
      '<div class="anim-title">' + titleText + '</div>' +
      '<div class="anim-sub">' + subText + '</div>' +
      '</div>';

    const root = document.documentElement;
    if(type === 'open') {
      root.style.setProperty('--anim-color-light', 'var(--green-light)');
      root.style.setProperty('--anim-color-deep', 'var(--green-deep)');
      document.getElementById("bgGlow").style.setProperty('--glow-color', 'var(--green-deep)');
    } else {
      root.style.setProperty('--anim-color-light', 'var(--red-light)');
      root.style.setProperty('--anim-color-deep', 'var(--red-deep)');
      document.getElementById("bgGlow").style.setProperty('--glow-color', 'var(--red-deep)');
    }

    const loader = document.getElementById("aLoader");
    const flash = document.getElementById("aFlash");
    const shock = document.getElementById("aShock");
    const icon = document.getElementById("aIcon");
    const glow = document.getElementById("aGlow");
    const text = document.getElementById("aText");

    loader.style.transition = "opacity 0.2s ease-out, transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1)";
    setTimeout(() => { loader.style.opacity = "1"; loader.style.transform = "scale(1) rotate(540deg)"; }, 50);

    setTimeout(() => {
      loader.style.transition = "transform 0.4s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.3s ease-in";
      loader.style.transform = "scale(0.01) rotate(600deg)";
      loader.style.opacity = "0";
    }, 2500);

    setTimeout(() => {
      flash.style.opacity = "1"; flash.style.transition = "transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease-out";
      setTimeout(() => { flash.style.transform = "scale(5)"; flash.style.opacity = "0"; }, 50);

      shock.style.opacity = "1"; shock.style.transition = "transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease-out";
      setTimeout(() => { shock.style.transform = "scale(4)"; shock.style.opacity = "0"; }, 50);

      icon.style.transition = "transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease-out";
      icon.style.opacity = "1"; icon.style.transform = "scale(1)";
      
      glow.style.transition = "opacity 0.8s ease"; glow.style.opacity = "0.6"; glow.style.transform = "scale(1)";
      glow.style.animation = "pulseAmbient 4s infinite ease-in-out 0.5s";

      setTimeout(() => {
        text.style.transition = "transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease";
        text.style.opacity = "1"; text.style.transform = "translateY(0)";
      }, 150);

      if(callback) setTimeout(callback, 2800);
    }, 2900);
  }

  function showWelcomeScreen() {
    wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
      '<h2 style="font-size:32px; font-weight:900; margin-bottom: 12px; letter-spacing: -0.5px;">' + escapeHTML(currentSession.title) + '</h2>' +
      '<p style="color:var(--muted); font-size:16px; margin-bottom: 36px; line-height: 1.5;">Die Abstimmung ist geöffnet.<br>Halte deinen Code bereit.</p>' +
      '<button class="btnPrimary" id="startVoteBtn">Jetzt wählen</button>' +
      '</div>';

    document.getElementById('startVoteBtn').addEventListener('click', () => {
      if (currentSession.activeGroups && currentSession.activeGroups.length > 0) {
        showCodeEntry();
      } else {
        voterCode = null;
        playTheatricalAnimation('open', showVotingOptions);
      }
    });
  }

  function showCodeEntry() {
    wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
      '<h2 style="font-size:26px; font-weight:900; margin-bottom: 12px; letter-spacing: -0.5px;">Wahl-Zugang</h2>' +
      '<p style="color:var(--muted); font-size:15px; margin-bottom: 28px;">Bitte gib deinen 5-stelligen Code ein.</p>' +
      '<div class="code-container" id="codeInputs">' +
      '<input type="text" maxlength="1" class="code-input" autofocus>' +
      '<input type="text" maxlength="1" class="code-input">' +
      '<input type="text" maxlength="1" class="code-input">' +
      '<input type="text" maxlength="1" class="code-input">' +
      '<input type="text" maxlength="1" class="code-input">' +
      '</div>' +
      '<div id="codeError" style="color:var(--red-light); font-size:14px; font-weight:500; min-height:20px; margin-top:12px; text-shadow: 0 0 10px rgba(255,255,255,0.3);"></div>' +
      '<button class="btnPrimary" id="verifyBtn">Code verifizieren</button>' +
      '</div>';

    const inputs = document.querySelectorAll('.code-input');
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        input.value = input.value.toUpperCase();
        if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
      });
    });

    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const code = Array.from(inputs).map(i => i.value).join('');
      if(code.length !== 5) return;
      
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.textContent = "Prüfe...";
      
      const { data: codeData, error: codeErr } = await sb.from("voter_codes")
        .select("*").in("group_id", currentSession.activeGroups).eq("code", code).maybeSingle();
        
      if(!codeData || codeErr) {
        document.getElementById('codeError').textContent = "Dieser Code ist für diese Wahl nicht gültig.";
        btn.disabled = false; btn.textContent = "Code verifizieren";
        return;
      }

      const { data: voteData } = await sb.from("votes")
        .select("id").eq("session_id", currentSession.id).eq("voter_code", code).maybeSingle();

      if(voteData) {
        document.getElementById('codeError').textContent = "Mit diesem Code wurde bereits abgestimmt.";
        btn.disabled = false; btn.textContent = "Code verifizieren";
        return;
      }

      voterCode = code; 
      playTheatricalAnimation('open', showVotingOptions);
    });
  }

  function showVotingOptions() {
    const opts = currentSession.options || [];
    const allowDelegation = !!currentSession.allow_delegation;
    let selected = null;
    let delegationCount = 0;

    let delegationHtml = "";
    if (allowDelegation) {
        delegationHtml = '<div class="delegationSection" id="delegationSection">' +
          '<div class="delegationTitle"><span style="font-size:18px;">🔄</span> Stimmübertragungen</div>' +
          '<div class="delegationCountRow">' +
          '<label>Anzahl übertragener Stimmen:</label>' +
          '<div class="countStepper">' +
          '<button class="stepBtn" id="stepMinus" type="button" disabled>−</button>' +
          '<span class="countDisplay" id="countDisplay">0</span>' +
          '<button class="stepBtn" id="stepPlus" type="button">+</button>' +
          '</div></div>' +
          '<div class="delegationNames" id="delegationNames"></div></div>';
    }

    let optsHtml = "";
    for (let i = 0; i < opts.length; i++) {
        optsHtml += '<button class="optBtn" data-i="' + i + '">' +
          '<div style="width:24px; height:24px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:0.3s;" class="radio-circle"></div>' +
          escapeHTML(opts[i]) +
          '</button>';
    }

    wrap.innerHTML = '<div class="glass">' +
      '<h2 style="font-size:26px; font-weight:900; margin-bottom: 10px; letter-spacing: -0.5px;">' + escapeHTML(currentSession.title) + '</h2>' +
      '<p style="color:var(--muted); font-size:15px; margin-bottom: 32px;">Wähle eine Option und bestätige.</p>' +
      '<div id="optList">' + optsHtml + '</div>' +
      delegationHtml +
      '<button class="btnPrimary" id="submitVote" disabled>Stimme abgeben</button>' +
      '<div id="vMsg" style="margin-top:16px; font-size:14px; font-weight:500; color:var(--red-light); text-align:center; text-shadow: 0 0 10px rgba(255,255,255,0.3);"></div>' +
      '</div>';

    const submitBtn = document.getElementById("submitVote");
    const vMsg = document.getElementById("vMsg");

    function updateSubmitLabel() {
      if (selected === null) return;
      const total = 1 + delegationCount;
      const optText = opts[selected];
      submitBtn.textContent = total > 1 ? '„' + optText + '“ wählen (' + total + ' Stimmen)' : '„' + optText + '“ wählen';
    }

    function updateDelegationNames() {
      if (!allowDelegation) return;
      const container = document.getElementById("delegationNames");
      const existing = container.querySelectorAll(".delegationNameInput");
      const currentCount = existing.length;
      if (delegationCount > currentCount) {
        for (let i = currentCount; i < delegationCount; i++) {
          const inp = document.createElement("input"); 
          inp.type = "text"; 
          inp.className = "delegationNameInput";
          inp.placeholder = "Name der " + (i + 1) + ". übertragenden Person"; 
          inp.maxLength = 80; 
          container.appendChild(inp);
        }
      } else {
        for (let i = currentCount; i > delegationCount; i--) { 
          container.removeChild(container.lastChild); 
        }
      }
      document.getElementById("stepMinus").disabled = delegationCount <= 0;
      document.getElementById("countDisplay").textContent = delegationCount;
      updateSubmitLabel();
    }

    if (allowDelegation) {
      document.getElementById("stepPlus").addEventListener("click", () => { if (delegationCount >= 9) return; delegationCount++; updateDelegationNames(); });
      document.getElementById("stepMinus").addEventListener("click", () => { if (delegationCount <= 0) return; delegationCount--; updateDelegationNames(); });
    }

    document.querySelectorAll(".optBtn").forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll(".optBtn").forEach(b => { 
            b.classList.remove('selected'); 
            b.querySelector('.radio-circle').style.borderColor = "var(--border)"; 
            b.querySelector('.radio-circle').style.boxShadow = "none";
            b.querySelector('.radio-circle').innerHTML = ""; 
        });
        btn.classList.add('selected'); 
        btn.querySelector('.radio-circle').style.borderColor = "var(--accent1)";
        btn.querySelector('.radio-circle').style.boxShadow = "0 0 10px rgba(255,215,0,0.3)";
        btn.querySelector('.radio-circle').innerHTML = '<div style="width:12px; height:12px; background:var(--accent1); border-radius:50%; box-shadow: 0 0 8px rgba(255,215,0,0.8);"></div>';
        selected = parseInt(btn.getAttribute('data-i')); 
        submitBtn.disabled = false; 
        updateSubmitLabel();
      });
    });

    submitBtn.addEventListener('click', async () => {
      if (selected === null) return;

      let delegationNames = null;
      if (allowDelegation && delegationCount > 0) {
        const inputs = document.querySelectorAll(".delegationNameInput");
        const names = Array.from(inputs).map(i => i.value.trim());
        if (names.some(n => !n)) { vMsg.textContent = "Bitte alle Namen der übertragenden Personen eintragen."; return; }
        delegationNames = names;
      }

      submitBtn.disabled = true; submitBtn.textContent = "Wird gespeichert...";

      const vToken = getVoterToken(currentSession.id);
      const weight = 1 + delegationCount;

      const { error } = await sb.from("votes").insert({
        session_id: currentSession.id,
        option_index: selected,
        voter_code: voterCode,     
        voter_token: vToken, 
        weight: weight,
        delegation_names: delegationNames
      });

      if(error) {
        if(error.code === "23505") {
          sessionStorage.setItem("voted_" + currentSession.id, "1");
          showBlockedState();
        } else {
          vMsg.textContent = "Fehler bei der Abgabe: " + error.message;
          submitBtn.disabled = false; updateSubmitLabel();
        }
        return;
      }

      sessionStorage.setItem("voted_" + currentSession.id, "1");
      wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
        '<div style="font-size:56px; margin-bottom:16px; filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));">✅</div>' +
        '<h2 style="font-size:26px; font-weight:900; margin-bottom:10px; letter-spacing: -0.5px;">Stimme erfasst</h2>' +
        '<p style="color:var(--muted); font-size:16px;">Danke für deine Teilnahme.</p>' +
        '</div>';
    });
  }

  // --- HAUPT-LOGIK ---
  (async () => {
    try {
        const { data, error } = await sb.from("vote_sessions")
          .select("*")
          .eq("status", "open")
          .order("created_at", { ascending: false })
          .limit(1)
          .maybeSingle();

        if (error) throw new Error(error.message);
        
        if (!data) {
            wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
                '<div style="font-size:48px; margin-bottom:16px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));">⏳</div>' +
                '<h2 style="font-size:26px; font-weight:900; margin-bottom:12px;">Keine aktive Wahl</h2>' +
                '<p style="color:var(--muted); font-size:15px; line-height:1.5;">Derzeit läuft keine Abstimmung. Bitte warte, bis der Wahlgang eröffnet wird.</p>' +
                '</div>';
            return;
        }
        
        currentSession = data;

        if (sessionStorage.getItem("voted_" + currentSession.id)) { 
            showBlockedState();
            return; 
        }

        let activeGroups = [];
        if (data.group_ids && data.group_ids.length > 0) {
            activeGroups = data.group_ids;
        } else if (data.group_id) {
            activeGroups = [data.group_id];
        }
        currentSession.activeGroups = activeGroups;

        if(activeGroups.length === 0) {
            const vToken = getVoterToken(data.id);
            const { data: existingVote } = await sb.from("votes")
                .select("id").eq("session_id", data.id).eq("voter_token", vToken).maybeSingle();
            
            if (existingVote) {
                sessionStorage.setItem("voted_" + currentSession.id, "1");
                showBlockedState();
                return;
            }
        }

        showWelcomeScreen();

    } catch(err) {
        wrap.innerHTML = '<div class="glass" style="text-align:center;">' +
            '<div style="font-size:40px; margin-bottom:16px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));">⚠️</div>' +
            '<h3 style="margin-bottom:12px; font-size:20px; font-weight:800;">Fehler beim Laden</h3>' +
            '<p style="color:var(--red-light); font-size:14px; font-weight:500;">' + err.message + '</p>' +
            '</div>';
    }
  })();
</script>
</body>
</html>
