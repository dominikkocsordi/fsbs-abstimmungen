<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
  <title>Abstimmung · FSBS</title>
  <meta content="#F4EFEA" name="theme-color"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    @font-face {
      font-family: 'Neulis Cursive';
      src: url('./fonts/neulis-cursive-regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      /* Warme, edle Gold/Weiß/Schwarz-Palette */
      --bg-gradient-start: #F8F5F1; /* Sehr zartes Cremeweiß */
      --bg-gradient-end: #E6D7C8;   /* Helles Champagner/Gold */
      
      --card-bg: #FFFFFF;           /* Reine weiße Karte für perfekten Kontrast */
      
      --accent: #B78873;            /* Das kräftigere Gold aus dem Herz */
      --accent-light: rgba(183, 136, 115, 0.1); 
      --accent-hover: #A67864;      

      --text-main: #000000;         /* Tiefschwarz für maximale Lesbarkeit */
      --text-muted: rgba(0, 0, 0, 0.55); 

      --border-color: rgba(183, 136, 115, 0.25); /* Sanfter Gold-Schimmer im Rand */
      
      --error-red: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body { 
      min-height: 100%; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      background: var(--bg-gradient-start); 
      color: var(--text-main); 
      overflow-x: hidden; 
      -webkit-font-smoothing: antialiased;
    }
    
    .font-cursive { 
      font-family: 'Neulis Cursive', cursive; 
      font-weight: bold !important; 
    }
    
    /* Hintergrund: Sanfter, warmer Premium-Farbverlauf */
    .bg-gradient {
      position: fixed; inset: 0; z-index: -3;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    }

    /* Layout */
    .wrap { width: 100%; display: flex; flex-direction: column; align-items: center; }
    
    /* Flache 2D Karte mit sehr weichem Schatten für die Trennung vom Hintergrund */
    .glass {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 48px 36px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
      animation: fadeUp 0.5s ease-out forwards;
    }

    /* Cleane 2D Typografie */
    .screen-title {
      font-size: 34px;
      color: var(--text-main);
      margin-bottom: 8px;
      text-align: center;
      line-height: 1.2;
      font-weight: normal;
    }
    
    .screen-subtitle {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 400;
      margin-bottom: 32px;
      text-align: center;
      line-height: 1.6;
    }

    /* Flache Code-Eingabe */
    .code-container { display: flex; gap: 12px; justify-content: center; margin: 0 0 32px; }
    .code-input {
      width: 54px; height: 68px;
      font-size: 28px; text-align: center;
      font-family: 'Neulis Cursive', cursive;
      font-weight: bold;
      background: var(--bg-gradient-start); /* Leicht abgesetzt von der weißen Karte */
      border: 1px solid rgba(0,0,0,0.08);
      color: var(--text-main);
      border-radius: 12px;
      outline: none;
      transition: all 0.2s ease;
      text-transform: uppercase;
      caret-color: var(--accent);
      -webkit-appearance: none;
      appearance: none;
    }
    .code-input:focus {
      background: #FFFFFF;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    /* Flache 2D Buttons */
    .btnPrimary {
      width: 100%; padding: 18px;
      background: var(--text-main); /* Schwarzer Button als starker Kontrast */
      color: #FFFFFF; font-weight: 600; font-size: 15px; letter-spacing: 0.5px; text-transform: uppercase;
      border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s ease;
    }
    .btnPrimary:hover:not(:disabled) {
      background: var(--accent); /* Wechselt zu Gold beim Hover */
      transform: translateY(-1px);
    }
    .btnPrimary:active:not(:disabled) { transform: scale(0.98); }
    .btnPrimary:disabled {
      background: rgba(0, 0, 0, 0.05); color: rgba(0, 0, 0, 0.3);
      cursor: not-allowed; transform: none;
    }

    /* Abstimmungs-Optionen - Minimalistisch */
    .optBtn {
      width: 100%; padding: 18px 20px; 
      background: #FFFFFF;
      border: 1px solid rgba(0, 0, 0, 0.08); 
      border-radius: 12px; color: var(--text-main);
      font-size: 15px; font-weight: 500; text-align: left; cursor: pointer;
      transition: all 0.2s ease; display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
    }
    .optBtn:hover { border-color: rgba(0, 0, 0, 0.2); background: var(--bg-gradient-start); }
    .optBtn.selected {
      border-color: var(--text-main);
      background: var(--accent-light);
    }

    .radio-circle {
      width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s ease;
      background: #FFFFFF;
    }
    .optBtn.selected .radio-circle {
      border-color: var(--text-main);
    }
    .radio-inner {
      width: 10px; height: 10px; background: var(--text-main); border-radius: 50%;
      transform: scale(0); transition: transform 0.2s ease;
    }
    .optBtn.selected .radio-inner { transform: scale(1); }

    /* Stimmübertragung UI */
    .delegationSection { margin: 24px 0; padding: 20px; border-radius: 12px; background: var(--bg-gradient-start); border: 1px solid rgba(0, 0, 0, 0.04); }
    .delegationTitle { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .delegationCountRow { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .delegationCountRow label { font-size: 14px; font-weight: 500; color: var(--text-main); }
    .countStepper { display: flex; align-items: center; gap: 12px; }
    .stepBtn { width: 32px; height: 32px; border-radius: 8px; background: #FFFFFF; border: 1px solid rgba(0,0,0,0.1); color: var(--text-main); font-size: 18px; cursor: pointer; display: grid; place-items: center; transition: 0.2s; }
    .stepBtn:hover:not(:disabled) { border-color: var(--text-main); }
    .stepBtn:disabled { opacity: 0.3; cursor: not-allowed; }
    .countDisplay { min-width: 24px; text-align: center; font-size: 16px; font-weight: 600; }
    .delegationNames { display: flex; flex-direction: column; gap: 12px; }

    input[type="text"], .delegationNameInput {
      background: #FFFFFF !important;
      border: 1px solid rgba(0,0,0,0.1) !important;
      color: var(--text-main) !important;
      padding: 14px 16px;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      width: 100%;
      transition: all 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="text"]::placeholder, .delegationNameInput::placeholder {
      color: rgba(0,0,0,0.3) !important;
    }
    input[type="text"]:focus, .delegationNameInput:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px var(--accent-light) !important;
    }

    /* Flache Animationen */
    .anim-container { position: relative; width: 100%; height: 160px; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; display: none; }
    .main-icon { position: absolute; width: 60px; height: 60px; opacity: 0; transform: scale(0.8); }
    .main-icon svg { width: 100%; height: 100%; fill: var(--text-main); }
    
    .anim-text { text-align: center; opacity: 0; transform: translateY(10px); }
    .anim-title { font-size: 24px; color: var(--text-main); margin-bottom: 4px; font-weight: 600; }
    .anim-sub { font-size: 12px; font-weight: 500; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; }

    /* Minimalistisches Seiten-Emblem */
    .page-outer {
      width: 100%; max-width: 440px; margin: 0 auto;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 20px 60px;
    }

    .page-emblem {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .page-emblem.visible { opacity: 1; transform: translateY(0); }

    .emblem-heart-center { width: 90px; height: 90px; margin-bottom: 12px; }
    .emblem-heart-center img { width: 100%; height: 100%; object-fit: contain; }

    .emblem-label { text-align: center; }
    .emblem-label-brand { font-family: 'Neulis Cursive', cursive; font-size: 22px; color: var(--text-main); line-height: 1; margin-bottom: 4px; }
    .emblem-label-event { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    .loading-pulse {
      animation: pulseText 1.5s infinite alternate ease-in-out;
    }
    @keyframes pulseText { 0% { opacity: 0.3; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="page-outer">
  <div id="pageHeader" class="page-emblem">
    <div class="emblem-heart-center">
      <img src="heart.png" alt="25 Jahre">
    </div>
    <div class="emblem-label">
      <div class="emblem-label-brand">FSBS</div>
      <div class="emblem-label-event">Mitgliederversammlung</div>
    </div>
  </div>

  <div class="wrap" id="mainWrap">
    <div id="loadingState" class="loading-pulse" style="text-align:center; color: var(--text-main); font-weight: 500; font-size: 14px;">Lade System...</div>
  </div>
</div>

<script>
  window.onerror = function(msg, url, lineNo, columnNo, error) {
    var wrap = document.getElementById("mainWrap");
    if(wrap) {
      var h = document.getElementById('pageHeader');
      if(h) { h.style.display='flex'; requestAnimationFrame(() => requestAnimationFrame(() => h.classList.add('visible'))); }
      wrap.innerHTML = `
        <div class="glass" style="text-align:center;">
          <h2 class="font-cursive screen-title">System-Fehler</h2>
          <p class="screen-subtitle" style="color:var(--text-main);">${msg}</p>
          <p style="color:var(--text-muted); font-size:12px;">Zeile: ${lineNo}</p>
        </div>`;
    }
    return false;
  };

  const SUPABASE_URL = "https://hdhueuihmxbskiusenpe.supabase.co";
  const SUPABASE_KEY = "sb_publishable_H6YjVStNvwY-VnZuZCYDxw_mOWEvAAW";
  let sb;

  const wrap = document.getElementById("mainWrap");
  let currentSession = null;
  let voterCode = null;

  const watchdogTimer = setTimeout(() => {
    if (wrap && wrap.innerHTML.includes('Lade System')) {
      const h = document.getElementById('pageHeader');
      if (h) { h.style.display = 'flex'; h.classList.add('visible'); }
      wrap.innerHTML = `
        <div class="glass" style="text-align:center;">
          <h2 class="font-cursive screen-title">Zeitüberschreitung</h2>
          <p class="screen-subtitle">Die Verbindung zum Server dauert zu lange.<br>Überprüfe dein Internet oder lade die Seite neu.</p>
          <button class="btnPrimary" onclick="window.location.reload()" style="margin-top: 10px;">Neu laden</button>
        </div>`;
    }
  }, 6000); 

  function showHeader() {
    const h = document.getElementById('pageHeader');
    h.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => h.classList.add('visible')));
  }
  function hideHeader() {
    const h = document.getElementById('pageHeader');
    h.classList.remove('visible');
    setTimeout(() => { h.style.display = 'none'; }, 400);
  }

  function getVoterToken(sessionId) {
    const key = "vt_" + sessionId;
    let vt = sessionStorage.getItem(key);
    if (!vt) { 
      vt = (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') 
            ? crypto.randomUUID() 
            : Math.random().toString(36).substring(2) + Date.now().toString(36);
      sessionStorage.setItem(key, vt); 
    }
    return vt;
  }

  function escapeHTML(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function showBlockedState() {
    showHeader();
    wrap.innerHTML = `
      <div class="glass" style="text-align:center;">
        <h2 class="font-cursive screen-title">Bereits abgestimmt</h2>
        <p class="screen-subtitle">Du hast an dieser Abstimmung bereits teilgenommen.</p>
      </div>`;
  }

  function playTheatricalAnimation(type, callback) {
    hideHeader();
    const isTxtOpen = type === 'open';
    const titleText = isTxtOpen ? 'Wahl eröffnet' : 'Wahl geschlossen';
    const subText = isTxtOpen ? 'Stimmabgabe freigegeben' : 'Keine weiteren Stimmen';
    
    const iconPath = isTxtOpen 
      ? "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" 
      : "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z";

    wrap.innerHTML = `
      <div class="anim-container" id="animBox" style="display:flex;">
        <div class="main-icon" id="aIcon"><svg viewBox="0 0 24 24"><path d="${iconPath}"/></svg></div>
      </div>
      <div class="anim-text" id="aText">
        <div class="font-cursive anim-title">${titleText}</div>
        <div class="anim-sub">${subText}</div>
      </div>`;

    const icon = document.getElementById("aIcon");
    const text = document.getElementById("aText");

    setTimeout(() => {
      icon.style.transition = "transform 0.4s ease, opacity 0.4s ease";
      icon.style.opacity = "1"; icon.style.transform = "scale(1)";
      
      setTimeout(() => {
        text.style.transition = "transform 0.4s ease, opacity 0.4s ease";
        text.style.opacity = "1"; text.style.transform = "translateY(0)";
      }, 100);

      if(callback) setTimeout(callback, 1200);
    }, 50);
  }

  function showWelcomeScreen() {
    showHeader();
    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title">${escapeHTML(currentSession.title)}</h2>
        <p class="screen-subtitle">Die Abstimmung ist geöffnet.<br>Halte deinen Code bereit.</p>
        <button class="btnPrimary" id="startVoteBtn">Jetzt wählen</button>
      </div>`;

    document.getElementById('startVoteBtn').addEventListener('click', () => {
      if (currentSession.activeGroups && currentSession.activeGroups.length > 0) {
        showCodeEntry();
      } else {
        voterCode = null;
        playTheatricalAnimation('open', showVotingOptions);
      }
    });
  }

  function showCodeEntry() {
    showHeader();
    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title">Wahl-Zugang</h2>
        <p class="screen-subtitle">Bitte gib deinen Code ein.</p>
        <div class="code-container" id="codeInputs">
          <input type="text" maxlength="1" class="code-input" autofocus>
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
          <input type="text" maxlength="1" class="code-input">
        </div>
        <div id="codeError" style="font-size:13px; font-weight:500; min-height:20px; margin-bottom:24px; text-align:center;"></div>
        <button class="btnPrimary" id="verifyBtn">Bestätigen</button>
      </div>`;

    const inputs = document.querySelectorAll('.code-input');
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        input.value = input.value.toUpperCase();
        if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
      });
    });

    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const code = Array.from(inputs).map(i => i.value).join('');
      if(code.length !== 5) return;
      
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.textContent = "Wird geprüft...";
      
      const { data: codeData, error: codeErr } = await sb.from("voter_codes")
        .select("*").in("group_id", currentSession.activeGroups).eq("code", code).maybeSingle();
        
      if(!codeData || codeErr) {
        document.getElementById('codeError').textContent = "Dieser Code ist ungültig.";
        btn.disabled = false; btn.textContent = "Bestätigen";
        return;
      }

      const { data: voteData } = await sb.from("votes")
        .select("id").eq("session_id", currentSession.id).eq("voter_code", code).maybeSingle();

      if(voteData) {
        document.getElementById('codeError').textContent = "Code wurde bereits verwendet.";
        btn.disabled = false; btn.textContent = "Bestätigen";
        return;
      }

      voterCode = code; 
      playTheatricalAnimation('open', showVotingOptions);
    });
  }

  function showVotingOptions() {
    hideHeader();
    const opts = currentSession.options || [];
    const allowDelegation = !!currentSession.allow_delegation;
    let selected = null;
    let delegationCount = 0;

    let delegationHtml = "";
    if (allowDelegation) {
        delegationHtml = `
          <div class="delegationSection" id="delegationSection">
            <div class="delegationTitle">Stimmübertragungen</div>
            <div class="delegationCountRow">
              <label>Übertragene Stimmen:</label>
              <div class="countStepper">
                <button class="stepBtn" id="stepMinus" type="button" disabled>−</button>
                <span class="countDisplay" id="countDisplay">0</span>
                <button class="stepBtn" id="stepPlus" type="button">+</button>
              </div>
            </div>
            <div class="delegationNames" id="delegationNames"></div>
          </div>`;
    }

    let optsHtml = "";
    for (let i = 0; i < opts.length; i++) {
        optsHtml += `
          <button class="optBtn" data-i="${i}">
            <div class="radio-circle"><div class="radio-inner"></div></div>
            ${escapeHTML(opts[i])}
          </button>`;
    }

    wrap.innerHTML = `
      <div class="glass">
        <h2 class="font-cursive screen-title">${escapeHTML(currentSession.title)}</h2>
        <p class="screen-subtitle" style="margin-bottom:24px;">Wähle eine Option aus.</p>
        <div id="optList">${optsHtml}</div>
        ${delegationHtml}
        <button class="btnPrimary" id="submitVote" disabled style="margin-top:16px;">Abstimmen</button>
        <div id="vMsg" style="margin-top:16px; font-size:13px; font-weight:500; text-align:center;"></div>
      </div>`;

    const submitBtn = document.getElementById("submitVote");
    const vMsg = document.getElementById("vMsg");

    function updateSubmitLabel() {
      if (selected === null) return;
      const total = 1 + delegationCount;
      submitBtn.textContent = total > 1 ? `Abstimmen (${total} Stimmen)` : `Abstimmen`;
    }

    function updateDelegationNames() {
      if (!allowDelegation) return;
      const container = document.getElementById("delegationNames");
      const existing = container.querySelectorAll(".delegationNameInput");
      const currentCount = existing.length;
      if (delegationCount > currentCount) {
        for (let i = currentCount; i < delegationCount; i++) {
          const inp = document.createElement("input"); 
          inp.type = "text"; 
          inp.className = "delegationNameInput";
          inp.placeholder = `Name Person ${i + 1}`; 
          inp.maxLength = 80; 
          container.appendChild(inp);
        }
      } else {
        for (let i = currentCount; i > delegationCount; i--) { 
          container.removeChild(container.lastChild); 
        }
      }
      document.getElementById("stepMinus").disabled = delegationCount <= 0;
      document.getElementById("countDisplay").textContent = delegationCount;
      updateSubmitLabel();
    }

    if (allowDelegation) {
      document.getElementById("stepPlus").addEventListener("click", () => { if (delegationCount >= 9) return; delegationCount++; updateDelegationNames(); });
      document.getElementById("stepMinus").addEventListener("click", () => { if (delegationCount <= 0) return; delegationCount--; updateDelegationNames(); });
    }

    document.querySelectorAll(".optBtn").forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll(".optBtn").forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); 
        selected = parseInt(btn.getAttribute('data-i')); 
        submitBtn.disabled = false; 
        updateSubmitLabel();
      });
    });

    submitBtn.addEventListener('click', async () => {
      if (selected === null) return;

      let delegationNames = null;
      if (allowDelegation && delegationCount > 0) {
        const inputs = document.querySelectorAll(".delegationNameInput");
        const names = Array.from(inputs).map(i => i.value.trim());
        if (names.some(n => !n)) { vMsg.textContent = "Bitte alle Namen eintragen."; return; }
        delegationNames = names;
      }

      submitBtn.disabled = true; submitBtn.textContent = "Wird gespeichert...";

      const vToken = getVoterToken(currentSession.id);
      const weight = 1 + delegationCount;

      const { error } = await sb.from("votes").insert({
        session_id: currentSession.id,
        option_index: selected,
        voter_code: voterCode,     
        voter_token: vToken, 
        weight: weight,
        delegation_names: delegationNames
      });

      if(error) {
        if(error.code === "23505") {
          sessionStorage.setItem("voted_" + currentSession.id, "1");
          showBlockedState();
        } else {
          vMsg.textContent = "Fehler: " + error.message;
          submitBtn.disabled = false; updateSubmitLabel();
        }
        return;
      }

      sessionStorage.setItem("voted_" + currentSession.id, "1");
      showHeader();
      wrap.innerHTML = `
        <div class="glass" style="text-align:center;">
          <h2 class="font-cursive screen-title">Stimme erfasst</h2>
          <p class="screen-subtitle" style="margin-bottom:0;">Vielen Dank für deine Teilnahme.</p>
        </div>`;
    });
  }

  // --- START ---
  (async () => {
    try {
        if (typeof supabase === 'undefined') {
            throw new Error("Datenbank-Skript konnte nicht geladen werden.");
        }
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await sb.from("vote_sessions")
          .select("*")
          .eq("status", "open")
          .order("created_at", { ascending: false })
          .limit(1)
          .maybeSingle();

        if (error) throw new Error(error.message);
        
        clearTimeout(watchdogTimer);
        
        if (!data) {
            showHeader();
            wrap.innerHTML = `
              <div class="glass" style="text-align:center;">
                <h2 class="font-cursive screen-title">Keine aktive Wahl</h2>
                <p class="screen-subtitle">Bitte warte auf die Eröffnung.</p>
              </div>`;
            return;
        }
        
        currentSession = data;

        if (sessionStorage.getItem("voted_" + currentSession.id)) { 
            showBlockedState();
            return; 
        }

        let activeGroups = [];
        if (data.group_ids && data.group_ids.length > 0) {
            activeGroups = data.group_ids;
        } else if (data.group_id) {
            activeGroups = [data.group_id];
        }
        currentSession.activeGroups = activeGroups;

        if(activeGroups.length === 0) {
            const vToken = getVoterToken(data.id);
            const { data: existingVote } = await sb.from("votes")
                .select("id").eq("session_id", data.id).eq("voter_token", vToken).maybeSingle();
            
            if (existingVote) {
                sessionStorage.setItem("voted_" + currentSession.id, "1");
                showBlockedState();
                return;
            }
        }

        showWelcomeScreen();

    } catch(err) {
        clearTimeout(watchdogTimer);
        showHeader();
        wrap.innerHTML = `
          <div class="glass" style="text-align:center;">
            <h3 class="font-cursive screen-title">Fehler</h3>
            <p class="screen-subtitle" style="color:var(--text-main);">${err.message}</p>
          </div>`;
    }
  })();
</script>
</body>
</html>
